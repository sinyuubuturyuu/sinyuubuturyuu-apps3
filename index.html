<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>シンユウ物流 テストランチャー</title>
  <meta name="description" content="sinyuubuturyuu と sinyuubuturyuu-pc のテスト用ランチャーです。">
  <link rel="stylesheet" href="./dev-launcher.css">
</head>
<body>
  <main class="page">
    <section class="hero card">
      <h1>シンユウ物流アプリ</h1>
      <div class="launch-grid" aria-label="アプリ">
        <article class="app-card">
          <p class="app-kind">Mobile</p>
          <h2>sinyuubuturyuu</h2>
          <div class="button-row">
            <a class="button primary" href="./sinyuubuturyuu/index.html" target="_blank" rel="noreferrer">開く</a>
          </div>
        </article>
        <article class="app-card">
          <p class="app-kind">PC</p>
          <h2>sinyuubuturyuu-pc</h2>
          <div class="button-row">
            <a class="button primary" href="./sinyuubuturyuu-pc/index.html" target="_blank" rel="noreferrer">開く</a>
          </div>
        </article>
      </div>
    </section>

    <section class="card qr-card" aria-labelledby="qrHeading">
      <div class="section-head">
        <p class="eyebrow">Mobile Install</p>
        <h2 id="qrHeading">sinyuubuturyuu インストール用QRコード</h2>
      </div>

      <div class="button-row compact">
        <button id="refreshQrButton" class="button primary" type="button">最新のQRコードを作る</button>
        <button id="selectNoticeFileButton" class="button primary" type="button">お知らせファイルをダウンロード</button>
        <button id="downloadQrButton" class="button primary" type="button">保存先フォルダを選んでQR画像を保存</button>
      </div>

      <input id="noticeFileInput" type="file" accept=".doc,.docx,.xls,.xlsx,.ppt,.pptx,.pdf,image/*" hidden>

      <div class="qr-preview">
        <img id="qrImage" alt="sinyuubuturyuu インストール用QRコード">
      </div>

      <div class="url-panel">
        <p class="url-label">Install URL</p>
        <code id="installUrlText" class="install-url"></code>
      </div>
      <p id="statusText" class="status-text" aria-live="polite"></p>
    </section>

    <section class="card" aria-labelledby="devHeading">
      <div class="section-head">
        <p class="eyebrow">Development</p>
        <h2 id="devHeading">DEV</h2>
      </div>
      <div class="button-row">
        <a id="devModeLink" class="button primary" href="./dev/index.html">DEV</a>
        <p id="devModeMessage" class="status-text dev-mode-message" aria-live="polite">DEVモードは開発環境のパソコンと同じWi-Fiでのみ使えます。</p>
      </div>
    </section>
  </main>

  <script src="./dev-launcher.js?v=20260330j"></script>
</body>
</html>
