<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>運用開始チェック | DEV</title>
  <meta name="description" content="1か月以内の運用開始に向けた DEV 用チェックページ">
  <link rel="stylesheet" href="../dev-launcher.css">
  <link rel="stylesheet" href="./release-checklist.css">
</head>
<body>
  <main class="page release-checklist-page">
    <section class="card release-checklist-card">
      <div class="section-head release-checklist-head">
        <div>
          <p class="eyebrow">DEV Roadmap</p>
          <h1>運用開始チェック</h1>
          <p class="lead">1か月以内に会社運用へ乗せるための確認ページです。できた項目から順にチェックしてください。</p>
        </div>
        <div class="button-row compact">
          <a class="button primary" href="./index.html">テストランチャーへ戻る</a>
        </div>
      </div>

      <section class="release-summary-grid" aria-label="進捗サマリー">
        <article class="summary-panel">
          <p class="summary-label">全体進捗</p>
          <p id="overallProgressText" class="summary-value">0 / 0</p>
          <div class="progress-track" aria-hidden="true">
            <div id="overallProgressBar" class="progress-fill"></div>
          </div>
          <p id="overallProgressCaption" class="status-text">未着手です。</p>
        </article>

        <article class="summary-panel">
          <div class="summary-panel-head">
            <div>
              <p class="summary-label">優先順位</p>
              <p class="status-text">前提になる作業から順番に並べています。</p>
            </div>
            <button id="resetChecklistButton" class="button primary reset-button" type="button">チェックを初期化</button>
          </div>
          <ol id="priorityList" class="priority-list"></ol>
        </article>
      </section>

      <section class="card section-card release-callout" aria-label="使い方">
        <h2>使い方</h2>
        <p class="lead">実装、案内、試験、運用判定までを同じページで管理します。前のセクションが終わってから次へ進む運用を基本にしてください。</p>
      </section>

      <div id="checklistSections" class="release-sections"></div>
    </section>
  </main>

  <script src="./release-checklist.js"></script>
</body>
</html>
