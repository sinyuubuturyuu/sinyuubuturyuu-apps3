<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../version-sync.js"></script>
  <script>
    (function () {
      const versionSync = window.SinyuubuturyuuPcVersion || null;
      const version = versionSync ? versionSync.ensureLatestVersion("20260330e") : "20260330e";
      if (!version) return;
      window.__SINYUUBUTURYUU_PC_VERSION__ = version;
    })();
  </script>
  <title>ポイント付与管理 | シンユウ物流パソコン用</title>
  <meta name="description" content="車番と乗務員ごとのポイントを確認して保存する管理画面">
  <link rel="icon" href="../icons/icon-sinyuubuturyuu-pc.png" type="image/png">
  <link rel="apple-touch-icon" href="../icons/icon-sinyuubuturyuu-pc.png">
  <link rel="manifest" href="../manifest.webmanifest?v=20260330a">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="../shell.css?v=20260330e">
  <link rel="stylesheet" href="./driver-points-kanri.css?v=20260330a">
</head>
<body class="shell-body">
  <main class="shell-page">
    <section class="shell-card points-card">
      <div class="settings-topbar">
        <a class="back-link" href="../index.html">トップへ戻る</a>
        <h1>ポイント付与管理</h1>
      </div>

      <div class="points-grid">
        <label class="field">
          <span>車番</span>
          <select id="vehicleSelect">
            <option value="">読み込み中...</option>
          </select>
        </label>

        <label class="field">
          <span>乗務員</span>
          <select id="driverSelect">
            <option value="">読み込み中...</option>
          </select>
        </label>
      </div>



      <section class="points-summary" aria-labelledby="pointsSummaryHeading">
        <div class="summary-copy">
          <p id="pointsSummaryHeading" class="summary-label">現在のポイント</p>
          <p id="pointsValue" class="points-value">--</p>
          <p id="pointsMeta" class="status-text">読み込み中...</p>
        </div>

        <label class="field field-inline-action">
          <span class="field-inline-header">
            <span>加減算ポイント</span>
            <button id="saveButton" class="mini-button primary" type="button">ポイント加算</button>
          </span>
          <input id="pointsInput" type="number" inputmode="numeric" step="1" placeholder="+10 または -5">
        </label>
      </section>

      <div class="button-row">
        <button id="openLeaderboardButton" class="mini-button secondary" type="button">社員ポイント一覧を見る</button>
      </div>
    </section>
  </main>

  <section id="leaderboardOverlay" class="leaderboard-overlay" hidden aria-hidden="true">
    <div class="leaderboard-panel">
      <div class="leaderboard-topbar">
        <h2>社員ポイント一覧</h2>
        <button id="closeLeaderboardButton" class="mini-button secondary" type="button">閉じる</button>
      </div>

      <p id="leaderboardStatus" class="status-text" aria-live="polite"></p>

      <div class="leaderboard-table-wrap">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>順位</th>
              <th>社員名</th>
              <th>ポイント</th>
            </tr>
          </thead>
          <tbody id="leaderboardBody">
            <tr>
              <td colspan="3">読み込み中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <script>
    (function () {
      const versionSync = window.SinyuubuturyuuPcVersion || null;
      const version = window.__SINYUUBUTURYUU_PC_VERSION__
        || (versionSync ? versionSync.getVersion("20260330e") : "20260330e");
      if (!("serviceWorker" in navigator)) {
        return;
      }

      window.addEventListener("load", function () {
        navigator.serviceWorker.register("../sw.js?v=" + version, {
          updateViaCache: "none"
        }).then(function (registration) {
          return registration.update();
        }).catch(function (error) {
          console.warn("Failed to register service worker:", error);
        });
      });
    })();
  </script>
  <script src="../launcher-window.js?v=20260330b"></script>
  <script>
    (function () {
      const topBackLink = document.querySelector(".back-link");

      if (window.launcherWindow) {
        window.launcherWindow.maximizeCurrentWindowIfRequested();
        window.launcherWindow.bindReturnToLauncher(topBackLink);
      }
    })();
  </script>
  <script src="../shared-settings.js?v=20260330a"></script>
  <script src="../getujitiretenkenhyou-pc/firebase/firebase-config.js?v=20260330a"></script>
  <script src="./firebase-config.js?v=20260330a"></script>
  <script src="../auth/firebase-auth.js?v=20260330b"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script>
    (function () {
      const version = window.__SINYUUBUTURYUU_PC_VERSION__ || "20260330e";
      const pointsMeta = document.getElementById("pointsMeta");

      if (window.APP_FIREBASE_DIRECTORY_SYNC_OPTIONS) {
        window.APP_FIREBASE_DIRECTORY_SYNC_OPTIONS.useAnonymousAuth = false;
      }
      if (window.DRIVER_POINTS_FIREBASE_SETTINGS) {
        window.DRIVER_POINTS_FIREBASE_SETTINGS.useAnonymousAuth = false;
      }

      (async function () {
        try {
          const user = await window.DevPcFirebaseAuth.requireUser({ loginPath: "../login.html" });
          if (!user) {
            return;
          }
          if (pointsMeta) {
            pointsMeta.textContent = "読み込み中...";
          }
          const script = document.createElement("script");
          script.src = "./driver-points-kanri.js?v=" + version;
          script.async = false;
          document.body.appendChild(script);
        } catch (error) {
          console.error(error);
          if (pointsMeta) {
            pointsMeta.textContent = "認証の確認に失敗しました。";
          }
        }
      })();
    })();
  </script>
</body>
</html>
