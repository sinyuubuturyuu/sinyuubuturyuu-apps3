<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      const version = "20260322b";
      const url = new URL(window.location.href);
      if (url.searchParams.get("v") === version) return;
      url.searchParams.set("v", version);
      window.location.replace(url.toString());
    })();
  </script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>シンユウ物流パソコン用</title>
  <link rel="icon" type="image/png" href="../icons/icon-sinyuubuturyuu-pc.png">
  <link rel="apple-touch-icon" href="../icons/icon-sinyuubuturyuu-pc.png">
  <link rel="stylesheet" href="./admin.css?v=20260322b">
</head>
<body>
  <main class="container">
    <div class="page-top-actions no-print">
      <a class="back-button" href="../index.html">トップへ戻る</a>
    </div>
    <h1>月次タイヤ点検表</h1>

    <section class="panel controls no-print" aria-label="検索条件">
      <div class="filter-grid">
        <label>
          点検日（開始）
          <div class="ym-selects">
            <select id="filterFromYear" aria-label="点検日開始年">
              <option value="">すべて</option>
            </select>
            <select id="filterFromMonth" aria-label="点検日開始月">
              <option value="">すべて</option>
            </select>
          </div>
        </label>
        <label>
          点検日（終了）
          <div class="ym-selects">
            <select id="filterToYear" aria-label="点検日終了年">
              <option value="">すべて</option>
            </select>
            <select id="filterToMonth" aria-label="点検日終了月">
              <option value="">すべて</option>
            </select>
          </div>
        </label>
        <label>
          車両番号
          <select id="filterVehicle"></select>
        </label>
        <label>
          乗務員
          <select id="filterDriver"></select>
        </label>
        <label class="wide">
          報告事項キーワード
          <input type="text" id="filterReport" placeholder="キーワード検索">
        </label>
      </div>
      <div class="actions">
        <button type="button" id="reloadBtn">再読込</button>
        <button type="button" id="csvBtn" title="表示してある分だけ保存">CSV保存</button>
        <button type="button" id="csvImportBtn">CSV取込</button>
        <input type="file" id="csvImportInput" accept=".csv,text/csv" hidden>
        <button type="button" id="printBtn">印刷</button>
      </div>
    </section>

    <p id="statusText" class="status">読み込み中...</p>
    <p id="errorText" class="error" role="alert" aria-live="assertive"></p>

    <section class="panel" aria-label="一覧">
      <div class="table-wrap">
        <table id="resultTable">
          <thead>
            <tr>
              <th>更新日時</th>
              <th>
                <span class="sortable-head">
                  <span>点検日</span>
                  <button type="button" class="sort-toggle no-print" data-sort-field="inspectionDate" aria-label="点検日で並び替え">▼</button>
                </span>
              </th>
              <th>
                <span class="sortable-head">
                  <span>年</span>
                  <button type="button" class="sort-toggle no-print" data-sort-field="year" aria-label="年で並び替え">▼</button>
                </span>
              </th>
              <th>
                <span class="sortable-head">
                  <span>月</span>
                  <button type="button" class="sort-toggle no-print" data-sort-field="month" aria-label="月で並び替え">▼</button>
                </span>
              </th>
              <th>
                <span class="sortable-head">
                  <span>車両番号</span>
                  <button type="button" class="sort-toggle no-print" data-sort-field="vehicleNumber" aria-label="車両番号で並び替え">▼</button>
                </span>
              </th>
              <th>
                <span class="sortable-head">
                  <span>乗務員名</span>
                  <button type="button" class="sort-toggle no-print" data-sort-field="driverName" aria-label="乗務員名で並び替え">▼</button>
                </span>
              </th>
              <th>点検表</th>
              <th>報告事項</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog id="detailDialog" class="detail-dialog">
    <form class="detail-dialog__panel" method="dialog">
      <header class="detail-dialog__header">
        <h2>記録詳細</h2>
        <button type="button" id="closeDetailBtn">閉じる</button>
      </header>
      <div id="detailBody" class="detail-dialog__body"></div>
    </form>
  </dialog>

  <script src="../firebase/firebase-app-compat.js"></script>
  <script src="../firebase/firebase-firestore-compat.js"></script>
  <script src="../firebase/firebase-auth-compat.js"></script>
  <script src="./firebase/firebase-config.js?v=20260322b"></script>
  <script src="./admin.js?v=20260322b"></script>
</body>
</html>
