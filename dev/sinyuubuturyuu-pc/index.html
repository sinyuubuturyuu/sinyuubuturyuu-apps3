<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      const version = "20260322b";
      const url = new URL(window.location.href);
      if (url.searchParams.get("v") === version) return;
      url.searchParams.set("v", version);
      window.location.replace(url.toString());
    })();
  </script>
  <title>シンユウ物流パソコン用</title>
  <meta name="description" content="月次タイヤ点検表と月次日常点検表の統合ランチャー">
  <link rel="icon" href="./icons/icon-sinyuubuturyuu-pc.png" type="image/png">
  <link rel="apple-touch-icon" href="./icons/icon-sinyuubuturyuu-pc.png">
  <link rel="manifest" href="./manifest.webmanifest?v=20260322b">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="./shell.css?v=20260322b">
</head>
<body class="shell-body">
  <main class="shell-page">
    <section class="shell-card home-card">
      <img
        class="shell-logo"
        src="./icons/icon-sinyuubuturyuu-pc.png"
        alt="シンユウ物流パソコン用"
      >
      <div class="shell-copy">
        <h1>シンユウ物流パソコン用</h1>
      </div>

      <nav class="home-actions" aria-label="アプリ選択">
        <a id="tireInspectionButton" class="action-button primary" href="./getujitiretenkenhyou-pc/index.html">月次タイヤ点検表</a>
        <a id="dailyInspectionButton" class="action-button primary" href="./getujinitijyoutenkenhyou-pc/index.html">月次日常点検表</a>
        <a id="driverPointsButton" class="action-button primary" href="./driver-points-kanri/index.html">ポイント管理</a>
        <a class="action-button secondary" href="./settings.html">設定</a>
      </nav>
    </section>
  </main>

  <script src="./launcher-window.js?v=20260322b"></script>
  <script>
    (function () {
      const version = "20260322b";
      const tireInspectionButton = document.getElementById("tireInspectionButton");
      const dailyInspectionButton = document.getElementById("dailyInspectionButton");
      const driverPointsButton = document.getElementById("driverPointsButton");
      const settingsButton = document.querySelector(".action-button.secondary");

      setVersionedHref(tireInspectionButton, "./getujitiretenkenhyou-pc/index.html");
      setVersionedHref(dailyInspectionButton, "./getujinitijyoutenkenhyou-pc/index.html");
      setVersionedHref(driverPointsButton, "./driver-points-kanri/index.html");
      setVersionedHref(settingsButton, "./settings.html");

      registerInstallServiceWorker();

      if (window.launcherWindow) {
        window.launcherWindow.bindInspectionLaunch(tireInspectionButton);
        window.launcherWindow.bindInspectionLaunch(dailyInspectionButton);
        window.launcherWindow.bindLauncherSizedLaunch(driverPointsButton);
      }

      function registerInstallServiceWorker() {
        if (!("serviceWorker" in navigator)) {
          return;
        }

        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js?v=20260322b", {
            updateViaCache: "none"
          }).then(function (registration) {
            return registration.update();
          }).catch(function (error) {
            console.warn("Failed to register service worker:", error);
          });
        });
      }

      function setVersionedHref(element, path) {
        if (!element) {
          return;
        }
        element.href = path + "?v=" + version;
      }
    })();
  </script>
</body>
</html>
