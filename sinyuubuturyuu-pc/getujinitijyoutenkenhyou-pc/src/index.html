<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../../version-sync.js"></script>
  <script>
    (function () {
      const versionSync = window.SinyuubuturyuuPcVersion || null;
      const version = versionSync ? versionSync.ensureLatestVersion("20260412e") : "20260412e";
      if (!version) return;
      window.__SINYUUBUTURYUU_PC_VERSION__ = version;
    })();
  </script>
  <title>シンユウ物流パソコン用</title>
  <link rel="icon" type="image/png" href="../../icons/icon-sinyuubuturyuu-pc.png" />
  <link rel="apple-touch-icon" href="../../icons/icon-sinyuubuturyuu-pc.png" />
  <link rel="stylesheet" href="./styles.css?v=20260412e" />
</head>
<body>
  <header class="app-header">
    <div class="header-actions">
      <a class="back-button" href="../../index.html">トップへ戻る</a>
    </div>
    <div id="toolbar" class="toolbar">
      <label>対象年度
        <select id="month" aria-label="対象年度">
          <option value="2024">2024年度</option>
          <option value="2025">2025年度</option>
          <option value="2026" selected>2026年度</option>
          <option value="2027">2027年度</option>
          <option value="2028">2028年度</option>
        </select>
      </label>
      <label>車番
        <select id="vehicle" disabled>
          <option value="">候補を読込中...</option>
        </select>
      </label>
      <label>運転者
        <select id="driver" disabled>
          <option value="">候補を読込中...</option>
        </select>
      </label>
      <button id="loadBtn" type="button">読込</button>
      <button id="saveBtn" type="button">保存</button>
      <button id="exportExcelBtn" type="button">スプレッドシート保存</button>
      <button id="printBtn" type="button">印刷</button>
      <button id="helpBtn" type="button">ヘルプ</button>
      <span id="status"></span>
    </div>
  </header>

  <main class="sheet-wrap">
    <section class="sheet" aria-label="月次日常点検記録表">
      <div id="monthTabs" class="month-tabs" aria-label="年度の対象月タブ"></div>
      <table id="inspectionTable">
        <thead>
          <tr>
            <th id="companyHead" colspan="8" class="company">有限会社シンユウ物流</th>
            <th id="titleHead" colspan="24" class="title">月 次 点 検 記 録 表</th>
            <th id="operationHead" colspan="3" class="manager-title">運行管理者</th>
            <th id="maintenanceHead" colspan="3" class="manager-title">整備管理者</th>
            <th id="maintenanceRecordHead" rowspan="4" class="maintenance-record-head">整備記録</th>
          </tr>
          <tr>
            <th id="monthHead" colspan="4" class="month-cell">令和8年 <span id="monthText">1</span>月</th>
            <th id="vehicleHead" colspan="4" class="vehicle-cell">車番: <span id="vehicleText">-</span></th>
            <th id="driverHead" colspan="24" class="driver-cell">運転者名（点検者）: <span id="driverText">-</span></th>
            <th id="operationManagerSlot" colspan="3" class="stamp-slot"></th>
            <th id="maintenanceManagerSlot" colspan="3" class="stamp-slot"></th>
          </tr>
          <tr id="datesRow">
            <th colspan="4" rowspan="2">点検個所</th>
            <th colspan="4" rowspan="2" class="content-head">
              <div class="content-head-inner">
                <span class="content-title">点検内容</span>
                <span class="day-mark-stack">
                  <span class="day-mark-cell">日</span>
                  <span class="day-mark-cell">曜</span>
                </span>
              </div>
            </th>
          </tr>
          <tr id="daysRow"></tr>
        </thead>
        <tbody id="inspectionBody"></tbody>
        <tfoot>
          <tr id="maintenanceFooterRow">
            <td colspan="8" class="bottom-label">整備管理者 印</td>
            <td id="maintenanceRecordFooterCell" class="maintenance-record-footer"></td>
          </tr>
        </tfoot>
      </table>
    </section>
</main>

  <div id="maintenanceNoteModal" class="maintenance-note-modal-backdrop" hidden>
    <section class="maintenance-note-modal" role="dialog" aria-modal="true" aria-labelledby="maintenanceNoteModalTitle">
      <h2 id="maintenanceNoteModalTitle">整備記録</h2>
      <p id="maintenanceNoteModalDay" class="maintenance-note-meta"></p>
      <p id="maintenanceNoteModalItems" class="maintenance-note-meta"></p>
      <label class="maintenance-note-field">
        <span>内容</span>
        <textarea id="maintenanceNoteInput" rows="4"></textarea>
      </label>
      <div class="maintenance-note-actions">
        <button id="maintenanceNoteSaveBtn" type="button">OK</button>
        <button id="maintenanceNoteCancelBtn" type="button">キャンセル</button>
      </div>
    </section>
  </div>

  <script src="../../launcher-window.js?v=20260412e"></script>
  <script>
    (function () {
      if (window.launcherWindow) {
        window.launcherWindow.maximizeCurrentWindowIfRequested();
        window.launcherWindow.bindReturnToLauncher(document.querySelector(".back-button"));
      }
    })();
  </script>
  <script src="../../getujitiretenkenhyou-pc/firebase/firebase-config.js?v=20260404b"></script>
  <script src="../../auth/firebase-auth.js?v=20260404b"></script>
  <script src="../../shared-settings.js?v=20260412e"></script>
  <script>
    (function () {
      const version = window.__SINYUUBUTURYUU_PC_VERSION__
        || (window.SinyuubuturyuuPcVersion ? window.SinyuubuturyuuPcVersion.getVersion("20260412e") : "20260412e");
      const launcherUrl = new URL("../../index.html", window.location.href);
      launcherUrl.searchParams.set("returnTo", window.location.href);

      const authApi = window.DevFirebaseAuth;
      if (!authApi || typeof authApi.requireUser !== "function") {
        console.warn("Auth bootstrap was not available.");
        window.location.replace(launcherUrl.toString());
        return;
      }

      authApi.requireUser({ redirectTo: launcherUrl.toString(), waitMs: 5000 }).then(function (user) {
        if (!user) {
          return;
        }
        loadScript();
      }).catch(function (error) {
        console.warn("Auth bootstrap failed:", error);
        window.location.replace(launcherUrl.toString());
      });

      function loadScript() {
        const script = document.createElement("script");
        script.type = "module";
        script.src = "./main.js?v=" + version;
        document.body.appendChild(script);
      }
    })();
  </script>
</body>
</html>
