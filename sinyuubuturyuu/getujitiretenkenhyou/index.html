<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>月次タイヤ点検表</title>
  <meta name="description" content="大型トラック向けの月次タイヤ点検Webアプリ">
  <meta name="theme-color" content="#1f4b73">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="タイヤ点検">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="stylesheet" href="./styles.css?v=20260312-2">
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div>
        <h1>月次タイヤ点検表</h1>
      </div>
      <div class="row">
        <span id="headerMonthLabel" class="header-month-label" hidden>未選択</span>
      </div>
    </header>

    <section id="basicScreen" class="screen active">
      <section class="panel">
        <div class="panel-head">基本情報</div>
        <div class="panel-body">
          <div class="meta basic-meta">
            <div class="field field-target-month">
              <label>対象月</label>
              <div id="targetMonthButtons" class="month-button-list" aria-label="対象月一覧"></div>
              <p id="monthSelectionStatus" class="month-selection-status">対象月を読み込み中です。</p>
            </div>
            <div class="field field-date">
              <label>点検日</label>
              <div id="inspectionDateDisplay" class="basic-value placeholder">未確定</div>
              <input id="inspectionDate" type="hidden">
            </div>
            <div class="field field-driver">
              <label>乗務員</label>
              <div id="driverNameDisplay" class="basic-value placeholder">未選択</div>
            </div>
            <div class="field field-vehicle">
              <label>車両番号</label>
              <div id="vehicleNumberDisplay" class="basic-value placeholder">未選択</div>
            </div>
            <div class="field field-mode">
              <label>車種</label>
              <div id="truckTypeDisplay" class="basic-value placeholder">未選択</div>
            </div>
          </div>
        </div>
      </section>
      <div class="row screen-actions">
        <button id="basicNextBtn" class="btn primary" type="button">点検開始</button>
        <a class="btn launcher-back-link" href="../index.html">戻る</a>
      </div>
    </section>

    <section id="truckScreen" class="screen">
      <section class="panel">
        <div class="panel-body">
          <div class="layout" role="group" aria-label="タイヤ入力">
            <div id="leftTires" class="col"></div>
            <div id="truckAxes" class="truck"></div>
            <div id="rightTires" class="col"></div>
            <div class="spare">
              <button id="spareButton" class="tire" type="button">スペア</button>
            </div>
          </div>
          <div class="truck-actions">
            <button id="truckToExportBtn" class="btn primary" type="button">点検完了</button>
            <button id="quickResetBtn" class="btn primary" type="button">リセット</button>
            <button id="truckBackBtn" class="btn" type="button">基本情報へ戻る</button>
          </div>
        </div>
      </section>
    </section>

    <section id="exportScreen" class="screen">
      <section class="panel">
        <div class="panel-body export-body">
          <p id="exportSummary" class="empty"></p>
          <div class="field export-note-field">
            <label for="reportNote">報告事項</label>
            <textarea id="reportNote" placeholder="報告事項を入力"></textarea>
          </div>
          <div class="row export-actions">
            <button id="exportCsvBtn" class="btn primary send-btn" type="button">専務に送る</button>
            <button id="exportBackBtn" class="btn send-btn" type="button">修正する</button>
          </div>
        </div>
      </section>
    </section>

    <section id="settingsScreen" class="screen">
      <section class="panel">
        <div class="panel-head settings-head">
          <span>設定</span>
          <span id="settingsUpdatedAt" class="settings-updated-at"></span>
        </div>
        <div class="panel-body settings-body">
          <div class="field">
            <label for="themeMode">表示モード</label>
            <select id="themeMode" class="sel">
              <option value="light">ライトモード</option>
              <option value="dark">ダークモード</option>
            </select>
          </div>
          <div class="field">
            <label for="newVehicleNumber">一時的に車両番号を変更</label>
            <div class="row" hidden>
              <input id="newVehicleNumber" type="text" placeholder="例: 品川 100 あ 1234" autocomplete="off">
              <button id="addVehicleBtn" class="btn primary" type="button">登録</button>
              <button id="saveVehicleBackupBtn" class="mini-btn show-btn" type="button">保存</button>
              <button id="restoreVehicleBackupBtn" class="mini-btn restore-btn" type="button">復元</button>
              <button id="deleteVehicleBackupBtn" class="mini-btn" type="button">削除</button>
            </div>
            <div id="vehicleBackupStatus" class="backup-status" hidden>バックアップ: 読み込み待ち</div>
          </div>
          <div class="field">
            <label>選択できる車両番号</label>
            <div id="vehicleList" class="vehicle-list"></div>
          </div>
          <div class="field">
            <label for="newDriverName">ログイン中の乗務員</label>
            <div class="row" hidden>
              <input id="newDriverName" type="text" placeholder="漢字 例: 山田 太郎" autocomplete="off">
              <input id="newDriverReading" type="text" placeholder="ひらがな 例: やまだ たろう" autocomplete="off">
              <button id="addDriverBtn" class="btn primary" type="button">登録</button>
              <button id="saveDriverBackupBtn" class="mini-btn show-btn" type="button">保存</button>
              <button id="restoreDriverBackupBtn" class="mini-btn restore-btn" type="button">復元</button>
              <button id="deleteDriverBackupBtn" class="mini-btn" type="button">削除</button>
            </div>
            <div id="driverBackupStatus" class="backup-status" hidden>バックアップ: 読み込み待ち</div>
          </div>
          <div class="field">
            <label>ログインIDに紐づく乗務員</label>
            <div id="driverList" class="vehicle-list"></div>
          </div>
          <div class="field">
            <label for="newTruckType">ログイン中の車種</label>
            <div class="row" hidden>
              <select id="newTruckType" class="sel"></select>
              <button id="addTruckTypeBtn" class="btn primary" type="button">登録</button>
            </div>
          </div>
          <div class="field">
            <label>車番に紐づく車種</label>
            <div id="truckTypeList" class="vehicle-list"></div>
          </div>
        </div>
      </section>
      <div class="row screen-actions">
        <button id="closeSettingsBtn" class="btn primary" type="button">戻る</button>
      </div>
    </section>
  </div>

  <dialog id="inputDialog" aria-label="タイヤ入力">
    <div class="modal">
      <div class="modal-head">
        <h3 id="dialogTarget">タイヤ入力</h3>
        <button id="dialogCloseBtn" class="btn" type="button" style="min-height:auto;padding:6px 10px;">戻る</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>入力項目</label>
          <div id="stepFieldList" class="step-field-list"></div>
        </div>
      </div>
      <div id="inputWarning" class="input-warning" role="alert" aria-live="assertive"></div>
      <div class="modal-foot">
        <button id="closeStepBtn" class="btn primary" type="button">完了</button>
      </div>
    </div>
  </dialog>

  <dialog id="sendConfirmDialog" aria-label="送信確認">
    <div class="modal">
      <div class="modal-head">
        <h3>送信確認</h3>
      </div>
      <div class="modal-body">
        <p class="confirm-text">間違いはありませんか？</p>
      </div>
      <div class="modal-foot">
        <button id="sendFixBtn" class="btn" type="button">修正</button>
        <button id="sendSubmitBtn" class="btn primary" type="button">送信</button>
      </div>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="sendFarewell" class="send-farewell" aria-hidden="true">
    <img id="sendFarewellImage" src="icons/send-farewell.png?v=20260315-15" alt="送信ありがとうございました。ご安全に。">
  </div>
  <script src="../shared-no-zoom.js"></script>
  <script src="../shared-settings.js?v=20260409a"></script>
  <script src="../driver-points/driver-points.js?v=20260423a"></script>
  <script src="./firebase/firebase-config.js?v=20260322-1"></script>
  <script src="../auth/firebase-auth.js?v=20260330a"></script>
  <script src="./firebase/firebase-cloud-sync.js?v=20260419a"></script>
  <script src="./app.js?v=20260405a"></script>
</body>
</html>
