<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>シンユウ物流アプリ</title>
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="よく使うアプリをすばやく起動するランチャー">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="シンユウ物流アプリ">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./sinyuubuturyuu-icon.png" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="stylesheet" href="./launcher.css?v=20260418a">
</head>
<body>
  <main class="launcher">
    <section class="launcher-card" aria-label="アプリ選択">
      <img class="launcher-logo" src="./sinyuubuturyuu-icon.png" alt="シンユウ物流アプリアイコン">
      <h1>シンユウ物流アプリ</h1>

      <section id="authLoading" class="auth-panel auth-loading" aria-label="認証確認中">
        <p class="auth-copy">ログイン状態を確認しています。</p>
      </section>

      <section id="loginPanel" class="auth-panel" aria-label="ログイン" hidden>
        <p class="auth-copy">メールアドレスとパスワードでログインしてください。</p>
        <form id="loginForm" class="auth-form">
          <label class="field">
            <span>メールアドレス</span>
            <input id="loginEmail" type="email" inputmode="email" autocomplete="email" placeholder="name@example.com" required>
          </label>
          <label class="field">
            <span>パスワード</span>
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="パスワード" required>
          </label>
          <button id="loginButton" class="launcher-button primary" type="submit">ログイン</button>
        </form>
        <p id="authStatus" class="auth-status" aria-live="polite"></p>
      </section>

      <section id="launcherApp" hidden>
        <div class="auth-user-row">
          <div>
            <p class="auth-user-label">ログイン中</p>
            <p id="authUserEmail" class="auth-user-email"></p>
          </div>
          <button id="logoutButton" class="mini-button primary" type="button">ログアウト</button>
        </div>

        <div class="button-group">
          <button id="app1Button" class="launcher-button primary" type="button"></button>
          <button id="app2Button" class="launcher-button primary" type="button"></button>
          <p id="launchStatus" class="launch-status" hidden aria-live="polite"></p>
          <section class="current-selection" aria-label="現在の設定">
            <div class="current-selection-row">
              <span class="current-selection-label">車両番号</span>
              <span id="currentVehicleNumber" class="current-selection-value"></span>
            </div>
            <div class="current-selection-row">
              <span class="current-selection-label">乗務員名</span>
              <span id="currentDriverName" class="current-selection-value"></span>
            </div>
            <div class="current-selection-row">
              <span class="current-selection-label">車種</span>
              <span id="currentTruckType" class="current-selection-value"></span>
            </div>
          </section>
          <button id="settingsButton" class="launcher-button secondary" type="button">設定</button>
        </div>
      </section>
    </section>
  </main>

  <dialog id="settingsDialog" class="settings-dialog" aria-label="設定">
    <form id="settingsForm" class="settings-panel" method="dialog">
      <div class="settings-header">
        <h2>設定</h2>
        <button id="closeSettingsButton" class="mini-button primary" type="button" aria-label="閉じる">閉じる</button>
      </div>

      <div class="settings-fields">
        <section class="settings-section">
          <label class="field">
            <span>表示モード</span>
            <select id="themeMode" class="field-select">
              <option value="light">ライトモード</option>
              <option value="dark">ダークモード</option>
            </select>
          </label>
        </section>

        <section class="settings-section">
          <div class="section-head">
            <h3>車両番号</h3>
            <p>追加後は必ず保存してください。</p>
          </div>
          <div class="field">
            <span>表示する車両番号</span>
            <select id="vehicleSelect" class="field-select"></select>
          </div>
        </section>

        <section class="settings-section">
          <div class="section-head">
            <h3>乗務員名</h3>
            <p>追加後は必ず保存してください。</p>
          </div>
          <div class="field">
            <span>表示する乗務員名</span>
            <p id="driverAutoDisplay" class="current-selection-value">未選択</p>
          </div>
        </section>

        <section class="settings-section">
          <div class="section-head">
            <h3>車種</h3>
          </div>
          <div class="field">
            <span>表示する車種</span>
            <p id="truckTypeAutoDisplay" class="current-selection-value">未選択</p>
          </div>
        </section>
      </div>

      <div class="settings-footer">
        <button id="confirmSettingsButton" class="mini-button primary" type="button">決定</button>
      </div>

      <p id="settingsStatus" class="settings-status" aria-live="polite"></p>
    </form>
  </dialog>

  <div id="sendFarewell" class="send-farewell" aria-hidden="true">
    <img id="sendFarewellImage" src="./getujitiretenkenhyou/icons/monthly-complete.png" alt="Monthly inspection complete.">
  </div>

  <script src="./shared-settings.js?v=20260405a"></script>
  <script src="./shared-no-zoom.js"></script>
  <script src="./driver-points/driver-points.js?v=20260404d"></script>
  <script src="./getujitiretenkenhyou/firebase/firebase-config.js?v=20260322-1"></script>
  <script src="./getujitiretenkenhyou/firebase/firebase-cloud-sync.js?v=20260322-1"></script>
  <script src="./auth/firebase-auth.js?v=20260330a"></script>
  <script src="./launcher.js?v=20260418a"></script>
</body>
</html>
