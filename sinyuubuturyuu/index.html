<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>シンユウ物流アプリ</title>
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="よく使うアプリをすばやく起動するランチャー">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="シンユウ物流アプリ">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./sinyuubuturyuu-icon.png" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="stylesheet" href="./launcher.css?v=20260330b">
</head>
<body>
  <main class="launcher">
    <section class="launcher-card" aria-label="アプリ選択">
      <img class="launcher-logo" src="./sinyuubuturyuu-icon.png" alt="シンユウ物流アプリアイコン">
      <h1>シンユウ物流アプリ</h1>
      <div id="installCallout" class="install-callout" hidden>
        <button id="installAppButton" class="launcher-button install-button" type="button">このアプリをインストール</button>
        <p id="installGuideText" class="install-guide" aria-live="polite"></p>
      </div>
      <div class="button-group">
        <button id="app1Button" class="launcher-button primary" type="button"></button>
        <button id="app2Button" class="launcher-button primary" type="button"></button>
        <section class="current-selection" aria-label="現在の設定">
          <div class="current-selection-row">
            <span class="current-selection-label">車両番号</span>
            <span id="currentVehicleNumber" class="current-selection-value"></span>
          </div>
          <div class="current-selection-row">
            <span class="current-selection-label">乗務員名</span>
            <span id="currentDriverName" class="current-selection-value"></span>
          </div>
          <div class="current-selection-row">
            <span class="current-selection-label">車種</span>
            <span id="currentTruckType" class="current-selection-value"></span>
          </div>
        </section>
        <button id="settingsButton" class="launcher-button secondary" type="button">設定</button>
      </div>
    </section>
  </main>

  <dialog id="settingsDialog" class="settings-dialog" aria-label="設定">
    <form id="settingsForm" class="settings-panel" method="dialog">
      <div class="settings-header">
        <h2>設定</h2>
        <button id="closeSettingsButton" class="mini-button primary" type="button" aria-label="閉じる">閉じる</button>
      </div>

      <div class="settings-fields">
        <section class="settings-section">
          <label class="field">
            <span>表示モード</span>
            <select id="themeMode" class="field-select">
              <option value="light">ライトモード</option>
              <option value="dark">ダークモード</option>
            </select>
          </label>
        </section>

        <section class="settings-section">
          <div class="section-head">
            <h3>車両番号</h3>
            <p>追加後は必ず保存してください。</p>
          </div>
          <div class="field">
            <span>表示する車両番号</span>
            <select id="vehicleSelect" class="field-select"></select>
          </div>
        </section>

        <section class="settings-section">
          <div class="section-head">
            <h3>乗務員名</h3>
            <p>追加後は必ず保存してください。</p>
          </div>
          <div class="field">
            <span>表示する乗務員名</span>
            <select id="driverSelect" class="field-select"></select>
          </div>
        </section>

        <section class="settings-section">
          <div class="section-head">
            <h3>車種</h3>
          </div>
          <select id="truckTypeSelect" class="field-select"></select>
        </section>
      </div>

      <div class="settings-footer">
        <button id="confirmSettingsButton" class="mini-button primary" type="button">決定</button>
      </div>

      <p id="settingsStatus" class="settings-status" aria-live="polite"></p>
    </form>
  </dialog>

  <div id="sendFarewell" class="send-farewell" aria-hidden="true">
    <img id="sendFarewellImage" src="./getujitiretenkenhyou/icons/monthly-complete.png" alt="Monthly inspection complete.">
  </div>

  <script src="./shared-settings.js"></script>
  <script src="./shared-no-zoom.js"></script>
  <script src="./driver-points/driver-points.js?v=20260322-1"></script>
  <script src="./getujitiretenkenhyou/firebase/firebase-config.js?v=20260322-1"></script>
  <script src="./getujitiretenkenhyou/firebase/firebase-cloud-sync.js?v=20260322-1"></script>
  <script src="./launcher.js?v=20260330b"></script>
</body>
</html>
